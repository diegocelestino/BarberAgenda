# Deploy Infrastructure Workflow
#
# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key for deployment
# - AWS_SECRET_ACCESS_KEY: AWS secret key for deployment
# - BARBERSHOP_EMAIL: Email for notifications
#
# After deployment, create admin user via AWS Console:
# 1. Go to AWS Cognito Console (https://console.aws.amazon.com/cognito/)
# 2. Select region: sa-east-1
# 3. Select User Pool "barbershop-users"
# 4. Click Users → Create user
# 5. Set username, email, and password
#

name: Deploy Infrastructure

on:
  push:
    branches: [ main ]
    paths:
    - 'backend/lambda-ts/**'
    - 'infrastructure/**'
    - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: sa-east-1

    - name: Install CDK dependencies
      run: npm install
      working-directory: infrastructure

    - name: Deploy CDK Stack
      run: npx cdk deploy --require-approval never
      working-directory: infrastructure
      env:
        BARBERSHOP_EMAIL: ${{ secrets.BARBERSHOP_EMAIL }}
