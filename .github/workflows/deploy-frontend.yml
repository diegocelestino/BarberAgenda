# Deploy Frontend Workflow
#
# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key for deployment
# - AWS_SECRET_ACCESS_KEY: AWS secret key for deployment
# - WHATSAPP_NUMBER: WhatsApp number for notifications
# - BARBERSHOP_EMAIL: Email for notifications
# - RECAPTCHA_SITE_KEY: Google reCAPTCHA site key
#
# Cognito configuration is automatically fetched from CloudFormation stack

name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
    - 'frontend/**'
    - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: sa-east-1

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Get API URL from CloudFormation
      id: get-api-url
      run: |
        API_URL=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' --output text)
        echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        echo "✅ API URL: $API_URL"

    - name: Get Cognito Configuration
      id: get-cognito
      run: |
        USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text --region sa-east-1)
        USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' --output text --region sa-east-1)

        if [ -z "$USER_POOL_ID" ] || [ -z "$USER_POOL_CLIENT_ID" ]; then
          echo "❌ ERROR: Cognito configuration not found in stack outputs!"
          echo "This means Cognito User Pool was not deployed."
          echo "Please deploy the infrastructure with Cognito first."
          exit 1
        fi

        echo "user_pool_id=$USER_POOL_ID" >> $GITHUB_OUTPUT
        echo "user_pool_client_id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
        echo "✅ User Pool ID: $USER_POOL_ID"
        echo "✅ User Pool Client ID: $USER_POOL_CLIENT_ID"

    - name: Build React app
      run: |
        cd frontend
        npm run build
      env:
        REACT_APP_API_URL: ${{ steps.get-api-url.outputs.api_url }}
        REACT_APP_USER_POOL_ID: ${{ steps.get-cognito.outputs.user_pool_id }}
        REACT_APP_USER_POOL_CLIENT_ID: ${{ steps.get-cognito.outputs.user_pool_client_id }}
        REACT_APP_AWS_REGION: sa-east-1
        REACT_APP_ENV: production
        REACT_APP_WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
        REACT_APP_BARBERSHOP_EMAIL: ${{ secrets.BARBERSHOP_EMAIL }}
        REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

    - name: Get S3 bucket name
      id: get-bucket
      run: |
        BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text)
        echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build/ s3://${{ steps.get-bucket.outputs.bucket_name }} --delete

    - name: Invalidate CloudFront cache
      run: |
        DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' --output text)
        aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"

    - name: Get CloudFront URL
      run: |
        CLOUDFRONT_URL=$(aws cloudformation describe-stacks --stack-name BarbershopStack-dev --query 'Stacks[0].Outputs[?OutputKey==`DistributionURL`].OutputValue' --output text)
        echo "🚀 Frontend deployed to: $CLOUDFRONT_URL"
